name: tempo
description: "Tempo — Time's Up digital, jeu de soirée fun et dynamique"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.0.0
  go_router: ^14.6.0
  shared_preferences: ^2.0.0
  google_fonts: ^6.2.1
  intl: ^0.20.2
  uuid: ^4.0.0
  flutter_animate: ^4.0.0
  audioplayers: ^6.0.0
  vibration: ^2.0.0
  lottie: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/sounds/
    - assets/animations/
    - assets/data/
